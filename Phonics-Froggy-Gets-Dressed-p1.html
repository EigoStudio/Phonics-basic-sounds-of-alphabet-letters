<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phonics Lesson - Froggy Gets Dressed (p1)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(135deg, #e3f2fd, #bbdefb);
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; text-align: center;
        }
        .card {
            background: white; padding: 40px; border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15); width: 85%; max-width: 850px;
        }
        .word-display { font-size: 5rem; font-weight: bold; margin: 20px 0; min-height: 140px; }
        .phrase-display { font-size: 2.8rem; font-weight: bold; color: #2c3e50; line-height: 1.5; }
        .trans { font-size: 1.6rem; color: #888; margin-bottom: 25px; min-height: 2rem; }
        .unit { display: inline-block; transition: 0.3s; color: #ccc; margin: 0 5px; }
        .active { color: #2196f3; transform: scale(1.1); text-decoration: underline; }
        .magic-e { color: #eee !important; text-decoration: none !important; }
        .active.magic-e { color: #ddd !important; }

        .btn {
            padding: 15px 40px; font-size: 1.5rem; border-radius: 50px;
            border: none; cursor: pointer; margin: 10px; font-weight: bold;
            box-shadow: 0 6px 0 #bbb; transition: 0.1s;
        }
        .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #bbb; }
        .btn-yes { background: #2ed573; color: white; box-shadow: 0 6px 0 #26af5c; }
        .btn-no { background: #ff4757; color: white; box-shadow: 0 6px 0 #d63031; }
        .btn-next { background: #ffa502; color: white; box-shadow: 0 6px 0 #e67e22; }
        .btn-audio { background: #2196f3; color: white; box-shadow: 0 6px 0 #1976d2; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <div id="q-text" style="font-size: 1.5rem; color: #555;">Can you read it?</div>
    <div id="display" class="word-display"></div>
    <div id="trans" class="trans"></div>

    <div id="btns-init">
        <button class="btn btn-yes" onclick="ansYes()">Yes! 👍 (よめた！)</button>
        <button class="btn btn-no" onclick="ansNo()">No 😢 (おしえて)</button>
    </div>
    
    <div id="btns-step" class="hidden">
        <button class="btn btn-next" onclick="doNext()">Next Step ➔</button>
    </div>

    <div id="btns-final" class="hidden">
        <button class="btn btn-yes" id="main-btn" onclick="nextContent()">Next 🚀</button>
    </div>
</div>

<script>
    const wordList = [
        { w: "It", s: ["i", "t"], t: "それは" },
        { w: "was", s: ["was"], t: "〜でした" },
        { w: "cold", s: ["c", "ol", "d"], t: "さむい" },
        { type: "phrase", w: "It was cold.", t: "さむい日でした。" },
        
        { w: "Froggy", s: ["fr", "og", "gy"], t: "フロッギー" },
        { w: "woke", s: ["w", "o", "k", "e"], t: "おきた", magic: 3 },
        { w: "up", s: ["u", "p"], t: "" },
        { w: "and", s: ["and"], t: "そして" },
        { w: "looked", s: ["l", "oo", "k", "ed"], t: "みた" },
        { w: "out", s: ["ou", "t"], t: "そとを" },
        { w: "the", s: ["the"], t: "その" },
        { w: "window", s: ["w", "in", "d", "ow"], t: "まど" },
        { type: "phrase", w: "Froggy woke up and looked out the window.", t: "フロッギーは目をさまして、窓の外を見ました。" },

        { w: "Snow", s: ["sn", "ow"], t: "ゆき" },
        { w: "he", s: ["he"], t: "かれは" },
        { w: "sang", s: ["s", "an", "g"], t: "うたった" },
        { type: "phrase", w: "\"Snow! Snow!\" he sang.", t: "「ゆきだ！ゆきだ！」とかれは歌いました。" },

        { w: "I", s: ["I"], t: "ぼくは" },
        { w: "want", s: ["want"], t: "〜したい" },
        { w: "to", s: ["to"], t: "" },
        { w: "play", s: ["pl", "ay"], t: "あそぶ" },
        { type: "phrase", w: "\"I want to play in the snow!\"", t: "「ゆきの中であそびたいな！」" }
    ];

    let currentIdx = -1;
    let step = 0;

    function getFemaleVoice() {
        const voices = window.speechSynthesis.getVoices();
        const preferred = ["Google US English", "Microsoft Zira", "Samantha", "Female"];
        let selected = null;
        for (let name of preferred) {
            selected = voices.find(v => (v.lang === 'en-US' || v.lang === 'en_US') && v.name.includes(name));
            if (selected) break;
        }
        return selected || voices.find(v => v.lang.startsWith('en'));
    }

    function speak(txt, rate = 0.6) { 
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(txt);
        const v = getFemaleVoice();
        if (v) u.voice = v;
        u.lang = 'en-US';
        u.rate = rate; 
        window.speechSynthesis.speak(u);
    }

    // 全文読み上げ用
    function speakFullStory() {
        const fullText = `It was cold. Froggy woke up and looked out the window. "Snow! Snow!" he sang. "I want to play in the snow!"`;
        speak(fullText, 0.6);
    }

    window.speechSynthesis.onvoiceschanged = getFemaleVoice;

    function nextContent() {
        currentIdx++;
        if (currentIdx < wordList.length) {
            const data = wordList[currentIdx];
            if (data.type === "phrase") {
                initPhrase(data);
            } else {
                initWord(data);
            }
        } else {
            finishGame();
        }
    }

    function initWord(data) {
        step = -1;
        document.getElementById('q-text').textContent = "Can you read it?";
        document.getElementById('display').className = "word-display";
        document.getElementById('display').innerText = data.w;
        document.getElementById('trans').innerText = data.t;
        
        document.getElementById('btns-init').classList.remove('hidden');
        document.getElementById('btns-step').classList.add('hidden');
        document.getElementById('btns-final').classList.add('hidden');
    }

    function ansYes() {
        const data = wordList[currentIdx];
        confetti({ particleCount: 100, spread: 70 });
        speak(data.w);
        showFinalBtn();
    }

    function ansNo() {
        const data = wordList[currentIdx];
        if (data.type === "phrase") {
            speak(data.w);
            showFinalBtn();
        } else {
            step = 0;
            document.getElementById('btns-init').classList.add('hidden');
            document.getElementById('btns-step').classList.remove('hidden');
            renderStep();
        }
    }

    function renderStep() {
        const data = wordList[currentIdx];
        let h = "";
        data.s.forEach((u, i) => {
            let extraClass = (data.magic !== undefined && i === data.magic) ? 'magic-e' : '';
            h += `<span class="unit ${i === step ? 'active' : ''} ${extraClass}">${u}</span>`;
        });
        document.getElementById('display').innerHTML = h;
    }

    function doNext() {
        const data = wordList[currentIdx];
        step++;
        if (step >= data.s.length) {
            document.getElementById('display').innerText = data.w;
            speak(data.w);
            showFinalBtn();
        } else {
            renderStep();
        }
    }

    function initPhrase(data) {
        document.getElementById('q-text').textContent = "Read the story!";
        const area = document.getElementById('display');
        area.className = "phrase-display";
        area.innerText = data.w;
        document.getElementById('trans').innerText = data.t;
        
        document.getElementById('btns-init').classList.remove('hidden');
        document.getElementById('btns-step').classList.add('hidden');
        document.getElementById('btns-final').classList.add('hidden');
    }

    function showFinalBtn() {
        const isPhrase = wordList[currentIdx].type === "phrase";
        document.getElementById('btns-step').classList.add('hidden');
        document.getElementById('btns-init').classList.add('hidden');
        document.getElementById('btns-final').classList.remove('hidden');
        document.getElementById('main-btn').textContent = isPhrase ? "Next Part ➔" : "Next Word 🚀";
    }

    function finishGame() {
        document.getElementById('q-text').textContent = "Excellent!";
        const fullStory = `It was cold.<br>Froggy woke up and looked out the window.<br>"Snow! Snow!" he sang.<br>"I want to play in the snow!"`;
        const area = document.getElementById('display');
        area.className = "phrase-display";
        area.style.fontSize = "2rem";
        area.innerHTML = fullStory;
        
        document.getElementById('trans').innerHTML = `
            <div>You read the whole page! 🌸</div>
            <button class="btn btn-audio" onclick="speakFullStory()">🔊 お手本をきく</button>
        `;
        
        document.getElementById('btns-final').classList.add('hidden');
        document.getElementById('btns-init').classList.add('hidden');
        
        speak("Great job! You can read the first page!", 0.6);
        confetti({ particleCount: 200, spread: 100 });
    }

    nextContent();
</script>
</body>
</html>
