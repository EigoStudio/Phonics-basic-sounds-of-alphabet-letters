<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Phonics Game - ar vs all</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --vowel-color: #ff0000;
            --consonant-color: #0000ff;
            --success: #4caf50;
            --accent: #ff9800;
        }

        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background: linear-gradient(-45deg, #e3f2fd, #f3e5f5, #e8f5e9, #fff3e0);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #menuView, #gameView { width: 95%; max-width: 800px; padding: 20px; text-align: center; }
        .hidden { display: none !important; }

        .game-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 35px;
            padding: 30px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.1);
            position: relative;
        }

        .single-image { width: 280px; height: 280px; margin: 0 auto 15px; cursor: pointer; transition: transform 0.2s; }
        .single-image img { width: 100%; height: 100%; object-fit: contain; border-radius: 20px; }
        
        .word-slot { font-size: 5rem; display: flex; justify-content: center; align-items: center; margin-bottom: 25px; font-weight: bold; }
        .drop-target {
            min-width: 140px;
            height: 110px;
            border-bottom: 10px solid #333;
            display: flex; justify-content: center; align-items: center;
            margin: 0 10px;
            color: var(--consonant-color);
        }

        .choices-container { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; }
        .choice-btn {
            width: 150px; height: 100px; background: white; border: 3px solid #eee;
            font-size: 3rem; border-radius: 25px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 0 #ddd;
            transition: all 0.1s;
            font-weight: bold;
            color: var(--consonant-color);
        }
        .choice-btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #ddd; }

        #toast {
            position: absolute; top: -30px; left: 50%; transform: translateX(-50%);
            background: var(--accent); color: white; padding: 12px 30px;
            border-radius: 50px; font-size: 1.8rem; font-weight: bold;
            opacity: 0; transition: all 0.4s; z-index: 10;
        }
        #toast.show { opacity: 1; top: 15px; }

        .btn-action {
            background: var(--success); color: white;
            padding: 18px 50px; font-size: 1.8rem;
            border-radius: 100px; border: none; cursor: pointer;
            box-shadow: 0 8px 0 #2e7d32;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            .word-slot { font-size: 3.5rem; }
            .choice-btn { width: 120px; height: 80px; font-size: 2.2rem; }
            .single-image { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>

    <div id="menuView">
        <h1 style="font-size: 3rem; color: #333; margin-top: 40px;">✨ Phonics: ar & all</h1>
        <p style="font-size: 1.5rem;">Look at the picture and choose!</p>
        <button class="btn-action" style="margin-top: 20px;" onclick="startGame()">Start! 🚀</button>
    </div>

    <div id="gameView" class="hidden">
        <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 15px;">
            <button onclick="showMenu()" style="cursor:pointer; background:none; border:none; color:#666; font-size:1.2rem; font-weight:bold;">← Menu</button>
            <div id="progressText" style="font-size: 1.5rem; font-weight: bold; background:white; padding:8px 20px; border-radius:20px; box-shadow: 0 4px 0 #ddd;">0 / 14</div>
        </div>
        
        <div class="game-card">
            <div id="toast">Great! ✨</div>
            <div class="single-image" onclick="speakWord(currentQuestion.word)">
                <img id="gameImg" src="" alt="target">
            </div>
            <div class="word-slot" id="wordContainer"></div>
            <div class="choices-container">
                <div class="choice-btn" onclick="checkAnswer('ar')">ar</div>
                <div class="choice-btn" onclick="checkAnswer('all')">all</div>
            </div>
            <button id="nextBtn" class="btn-action hidden" onclick="nextQuestion()">Next! →</button>
        </div>
    </div>

    <script>
        const imagePath = "images-ar-all/";
        const wordData = [
            { word: 'car', target: 'ar' }, { word: 'jar', target: 'ar' }, 
            { word: 'star', target: 'ar' }, { word: 'far', target: 'ar' },
            { word: 'scar', target: 'ar' }, { word: 'park', target: 'ar' },
            { word: 'farm', target: 'ar' }, { word: 'small', target: 'all' },
            { word: 'tall', target: 'all' }, { word: 'wall', target: 'all' },
            { word: 'fall', target: 'all' }, { word: 'ball', target: 'all' },
            { word: 'call', target: 'all' }, { word: 'mall', target: 'all' }
        ];

        let gameQueue = [];
        let currentQuestion = null;
        let solvedCount = 0;
        let preferredVoice = null;

        // 音声リストをロードする関数
        function loadVoices() {
            const voices = window.speechSynthesis.getVoices();
            if (voices.length === 0) return;

            // 自然なアメリカ英語の女性の声を探す
            preferredVoice = 
                voices.find(v => v.lang === "en-US" && v.name.includes("Google US English")) ||
                voices.find(v => v.lang === "en-US" && v.name.includes("Samantha")) ||
                voices.find(v => v.lang.startsWith("en-US") && (v.name.includes("Female") || v.name.includes("Zira")));
        }

        // 音声の準備
        window.speechSynthesis.onvoiceschanged = loadVoices;
        loadVoices();

        // 読み上げ関数
        function speakWord(text) {
            if (!text) return;

            const synth = window.speechSynthesis;
            synth.cancel(); 
            
            const uttr = new SpeechSynthesisUtterance(text);
            
            if (preferredVoice) {
                uttr.voice = preferredVoice;
            } else {
                uttr.lang = "en-US";
            }
            
            // 子供向け設定：ゆっくり・明るいトーン
            uttr.rate = 0.65;  
            uttr.pitch = 1.05; 

            synth.speak(uttr);
        }

        function startGame() {
            loadVoices(); 
            document.getElementById('menuView').classList.add('hidden');
            document.getElementById('gameView').classList.remove('hidden');
            gameQueue = [...wordData].sort(() => Math.random() - 0.5); 
            solvedCount = 0;
            nextQuestion();
        }

        function nextQuestion() {
            if (gameQueue.length === 0) {
                finishGame();
                return;
            }

            currentQuestion = gameQueue.pop();
            solvedCount++;
            
            document.getElementById('progressText').textContent = `${solvedCount} / ${wordData.length}`;
            document.getElementById('gameImg').src = `${imagePath}${currentQuestion.word}.jpg`;
            document.getElementById('nextBtn').classList.add('hidden');
            document.getElementById('toast').classList.remove('show');
            
            const container = document.getElementById('wordContainer');
            // 単語を分割して空欄を挿入
            const parts = currentQuestion.word.split(currentQuestion.target);
            container.innerHTML = `<span>${parts[0]}</span><div id="dropTarget" class="drop-target">?</div><span>${parts[1]}</span>`;
        }

        function checkAnswer(selected) {
            if (!document.getElementById('nextBtn').classList.contains('hidden')) return;

            if (selected === currentQuestion.target) {
                document.getElementById('dropTarget').textContent = selected;
                document.getElementById('dropTarget').style.color = 'var(--success)';
                document.getElementById('toast').classList.add('show');
                document.getElementById('nextBtn').classList.remove('hidden');
                
                speakWord(currentQuestion.word);
                confetti({ particleCount: 60, spread: 70, origin: { y: 0.8 } });
            } else {
                speakWord(selected);
            }
        }

        function finishGame() {
            speakWord("Excellent! You did a great job!");
            confetti({ particleCount: 200, spread: 120, origin: { y: 0.6 } });
            setTimeout(() => {
                alert("🏆 Awesome! You cleared all words!");
                showMenu();
            }, 800);
        }

        function showMenu() {
            document.getElementById('gameView').classList.add('hidden');
            document.getElementById('menuView').classList.remove('hidden');
        }
    </script>
</body>
</html>
